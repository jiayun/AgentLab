name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup target add ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIR="agentlab-${VERSION}-${{ matrix.target }}"
          mkdir -p "dist/${DIR}"
          cp "target/${{ matrix.target }}/release/agentlab" "dist/${DIR}/"
          cp -r static "dist/${DIR}/"
          cp agentlab.toml.example "dist/${DIR}/"
          cp README.md LICENSE-MIT LICENSE-APACHE "dist/${DIR}/"
          cd dist && tar czf "${DIR}.tar.gz" "${DIR}"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $version = "$env:GITHUB_REF_NAME" -replace '^v',''
          $dir = "agentlab-${version}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path "dist/${dir}" -Force
          Copy-Item "target/${{ matrix.target }}/release/agentlab.exe" "dist/${dir}/"
          Copy-Item -Recurse "static" "dist/${dir}/"
          Copy-Item "agentlab.toml.example" "dist/${dir}/"
          Copy-Item "README.md","LICENSE-MIT","LICENSE-APACHE" "dist/${dir}/"
          Compress-Archive -Path "dist/${dir}" -DestinationPath "dist/${dir}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentlab-${{ matrix.target }}
          path: dist/agentlab-*.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
